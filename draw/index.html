  <h1 style="font-size:1.7rem;color:#1f3a2e;border-bottom:3px solid #e0a82e;padding-bottom:10px">黒板キャンバス（チョークで書く体験）</h1>
  <p style="color:#4b5b51;font-size:1.05rem;margin:16px 0 24px">画面の黒板を、指やマウスでなぞると、チョークのような“かすれ”た線が描けます。白・赤・青・黄・緑のチョークを選んだり、黒板消しで消したり、全部消したりできます。スマホ・タブレットでも遊べます。</p>
  <p>「チョークで書く」しくみ——やわらかいチョークがこすれて粉になり、黒板の細かなデコボコにひっかかって残る——を、実際に手を動かして体感できる全年齢向けのページです。書き味のことは <a href="/chalk-lab/basics/" style="color:#1f3a2e;font-weight:600">チョークの基礎</a> でくわしく紹介しています。</p>
