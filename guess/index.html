  <h1 style="font-size:1.7rem;color:#1f3a2e;border-bottom:3px solid #e0a82e;padding-bottom:10px">チョーク絵当て（図鑑カードクイズ）</h1>
  <p style="color:#4b5b51;font-size:1.05rem;margin:16px 0 24px">図鑑カードの絵（アイコン）を見て、正しい名前を当てるゲームです。字が読めなくても、絵で楽しめます。正解すると、そのカードの習熟度（★）が上がります。あそぶには、よみものを読んでカードを4枚以上集めてください。</p>
  <p>白墨・色チョーク・ダストレス・羽衣チョーク・円石藻・クライミング用など、集めたカードがそのまま出題されます。<a href="/chalk-lab/dex/" style="color:#1f3a2e;font-weight:600">チョーク図鑑</a>でカードを集めてから挑戦しましょう。</p>
